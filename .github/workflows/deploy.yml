name: Build & Deploy to Azure

# Every push to main runs lint + build (images always current in ACR).
# Deploy to Azure ONLY when commit message contains [publish] or run is triggered manually.

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      image_tag:
        description: 'Docker image tag (default: git SHA)'
        required: false
        default: ''

env:
  ACR_LOGIN_SERVER: prismragacr.azurecr.io
  RESOURCE_GROUP: prismrag-rg
  LOCATION: eastus2
  # User-assigned managed identity that has AcrPull on prismragacr
  PULL_IDENTITY_NAME: prismrag-pull-id

jobs:
  # ── 1. Lint ───────────────────────────────────────────────────────────────
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip

      - name: Install deps
        run: pip install -r requirements.txt -r requirements-test.txt --quiet

      - name: Syntax check (no DB needed)
        run: python -c "import main; print('main.py OK')"
        env:
          PRISMRAG_DB_DSN: postgresql://skip:skip@localhost:5432/skip
          JWT_SECRET: ci-placeholder
          GEMINI_API_KEY: ci-placeholder

  # ── 2. Build & push Docker images (every push) ───────────────────────────
  build:
    name: Build & Push
    runs-on: ubuntu-latest
    needs: lint
    outputs:
      image_tag: ${{ steps.tag.outputs.tag }}

    steps:
      - uses: actions/checkout@v4

      - name: Resolve image tag
        id: tag
        run: |
          if [ -n "${{ github.event.inputs.image_tag }}" ]; then
            echo "tag=${{ github.event.inputs.image_tag }}" >> $GITHUB_OUTPUT
          else
            echo "tag=${{ github.sha }}" >> $GITHUB_OUTPUT
          fi

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to ACR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.ACR_LOGIN_SERVER }}
          username: ${{ secrets.ACR_USERNAME }}
          password: ${{ secrets.ACR_PASSWORD }}

      - name: Build & push API image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: Dockerfile
          platforms: linux/amd64
          push: true
          tags: |
            ${{ env.ACR_LOGIN_SERVER }}/prismrag-api:${{ steps.tag.outputs.tag }}
            ${{ env.ACR_LOGIN_SERVER }}/prismrag-api:latest
          cache-from: type=gha,scope=api
          cache-to: type=gha,mode=max,scope=api

      - name: Build & push Worker image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: Dockerfile.worker
          platforms: linux/amd64
          push: true
          tags: |
            ${{ env.ACR_LOGIN_SERVER }}/prismrag-worker:${{ steps.tag.outputs.tag }}
            ${{ env.ACR_LOGIN_SERVER }}/prismrag-worker:latest
          cache-from: type=gha,scope=worker
          cache-to: type=gha,mode=max,scope=worker

  # ── 3. Deploy — only when commit message contains [publish] ──────────────
  deploy:
    name: Deploy to Azure
    runs-on: ubuntu-latest
    needs: build
    environment: production
    if: >
      github.event_name == 'workflow_dispatch' ||
      contains(github.event.head_commit.message, '[publish]')

    steps:
      - uses: actions/checkout@v4

      - name: Azure login
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      # ── Resolve the managed identity resource ID (pre-created, has AcrPull)
      - name: Resolve pull identity
        id: identity
        run: |
          ID=$(az identity show \
            --name "${{ env.PULL_IDENTITY_NAME }}" \
            --resource-group "${{ env.RESOURCE_GROUP }}" \
            --query id -o tsv)
          echo "id=${ID}" >> $GITHUB_OUTPUT

      # ── Deploy infrastructure (env, logs, optional postgres/redis)
      - name: Deploy infrastructure (Bicep)
        run: |
          az deployment group create \
            --resource-group "${{ env.RESOURCE_GROUP }}" \
            --template-file infra/container-env.bicep \
            --parameters location="${{ env.LOCATION }}" externalDb=true deployRedis=false \
            --mode Incremental \
            --output none

      # ── Deploy / update API container app
      - name: Deploy API
        env:
          DB_DSN: ${{ secrets.DB_CONNECTION_STRING }}
          JWT_SECRET: ${{ secrets.JWT_SECRET }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          STRIPE_SK: ${{ secrets.STRIPE_SECRET_KEY }}
          STRIPE_WH: ${{ secrets.STRIPE_WEBHOOK_SECRET }}
          SB_CONN: ${{ secrets.SERVICE_BUS_CONN_STR }}
          ACS_CONN: ${{ secrets.AZURE_COMMUNICATION_CONNECTION_STRING }}
          TAG: ${{ needs.build.outputs.image_tag }}
          IDENTITY_ID: ${{ steps.identity.outputs.id }}
        run: |
          NC="not-configured"
          DB="${DB_DSN:-$NC}" SK="${STRIPE_SK:-$NC}" WH="${STRIPE_WH:-$NC}"
          SB="${SB_CONN:-$NC}" AC="${ACS_CONN:-$NC}"

          SECRETS="db-dsn=${DB} jwt-secret=${JWT_SECRET} gemini-key=${GEMINI_API_KEY} \
            stripe-secret=${SK} stripe-webhook=${WH} \
            redis-url=${NC} servicebus-conn=${SB} acs-conn=${AC}"

          ENV_VARS="PRISMRAG_DB_DSN=secretref:db-dsn \
            REDIS_URL=secretref:redis-url \
            JWT_SECRET=secretref:jwt-secret \
            GEMINI_API_KEY=secretref:gemini-key \
            STRIPE_SECRET_KEY=secretref:stripe-secret \
            STRIPE_WEBHOOK_SECRET=secretref:stripe-webhook \
            AZURE_SERVICE_BUS_CONNECTION_STRING=secretref:servicebus-conn \
            AZURE_COMMUNICATION_CONNECTION_STRING=secretref:acs-conn \
            STRIPE_PRICE_STARTER=${{ secrets.STRIPE_PRICE_STARTER || 'not-configured' }} \
            STRIPE_PRICE_PROFESSIONAL=${{ secrets.STRIPE_PRICE_PROF || 'not-configured' }} \
            STRIPE_PRICE_ENTERPRISE=${{ secrets.STRIPE_PRICE_ENTERPRISE || 'not-configured' }} \
            PRISMRAG_ENV=production \
            PRISMRAG_EMAIL_ENABLED=true \
            PRISMRAG_EMAIL_FROM=${{ secrets.PRISMRAG_EMAIL_FROM || 'PrismRAG@insightits.com' }} \
            PRISMRAG_BASE_URL=${{ secrets.PRISMRAG_BASE_URL || 'https://prismrag.insightits.com' }}"

          # Try create (first deploy); on conflict update image + secrets
          az containerapp create \
            --name prismrag-api \
            --resource-group "${{ env.RESOURCE_GROUP }}" \
            --environment prismrag-env \
            --image "${{ env.ACR_LOGIN_SERVER }}/prismrag-api:${TAG}" \
            --registry-server "${{ env.ACR_LOGIN_SERVER }}" \
            --registry-identity "${IDENTITY_ID}" \
            --user-assigned "${IDENTITY_ID}" \
            --target-port 8001 --ingress external \
            --min-replicas 1 --max-replicas 20 \
            --cpu 0.5 --memory 1Gi \
            --secrets $SECRETS \
            --env-vars $ENV_VARS \
            --output none \
          2>/dev/null || \
          az containerapp update \
            --name prismrag-api \
            --resource-group "${{ env.RESOURCE_GROUP }}" \
            --image "${{ env.ACR_LOGIN_SERVER }}/prismrag-api:${TAG}" \
            --output none

      # ── Deploy / update Worker container app
      - name: Deploy Worker
        env:
          DB_DSN: ${{ secrets.DB_CONNECTION_STRING }}
          JWT_SECRET: ${{ secrets.JWT_SECRET }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          STRIPE_SK: ${{ secrets.STRIPE_SECRET_KEY }}
          STRIPE_WH: ${{ secrets.STRIPE_WEBHOOK_SECRET }}
          SB_CONN: ${{ secrets.SERVICE_BUS_CONN_STR }}
          ACS_CONN: ${{ secrets.AZURE_COMMUNICATION_CONNECTION_STRING }}
          TAG: ${{ needs.build.outputs.image_tag }}
          IDENTITY_ID: ${{ steps.identity.outputs.id }}
        run: |
          NC="not-configured"
          DB="${DB_DSN:-$NC}" SK="${STRIPE_SK:-$NC}" WH="${STRIPE_WH:-$NC}"
          SB="${SB_CONN:-$NC}" AC="${ACS_CONN:-$NC}"

          SECRETS="db-dsn=${DB} jwt-secret=${JWT_SECRET} gemini-key=${GEMINI_API_KEY} \
            stripe-secret=${SK} stripe-webhook=${WH} \
            redis-url=${NC} servicebus-conn=${SB} acs-conn=${AC}"

          ENV_VARS="PRISMRAG_DB_DSN=secretref:db-dsn \
            REDIS_URL=secretref:redis-url \
            JWT_SECRET=secretref:jwt-secret \
            GEMINI_API_KEY=secretref:gemini-key \
            STRIPE_SECRET_KEY=secretref:stripe-secret \
            STRIPE_WEBHOOK_SECRET=secretref:stripe-webhook \
            AZURE_SERVICE_BUS_CONNECTION_STRING=secretref:servicebus-conn \
            AZURE_COMMUNICATION_CONNECTION_STRING=secretref:acs-conn \
            STRIPE_PRICE_STARTER=${{ secrets.STRIPE_PRICE_STARTER || 'not-configured' }} \
            STRIPE_PRICE_PROFESSIONAL=${{ secrets.STRIPE_PRICE_PROF || 'not-configured' }} \
            STRIPE_PRICE_ENTERPRISE=${{ secrets.STRIPE_PRICE_ENTERPRISE || 'not-configured' }} \
            PRISMRAG_ENV=production \
            PRISMRAG_EMAIL_ENABLED=true \
            PRISMRAG_EMAIL_FROM=${{ secrets.PRISMRAG_EMAIL_FROM || 'PrismRAG@insightits.com' }} \
            PRISMRAG_BASE_URL=${{ secrets.PRISMRAG_BASE_URL || 'https://prismrag.insightits.com' }}"

          az containerapp create \
            --name prismrag-worker \
            --resource-group "${{ env.RESOURCE_GROUP }}" \
            --environment prismrag-env \
            --image "${{ env.ACR_LOGIN_SERVER }}/prismrag-worker:${TAG}" \
            --registry-server "${{ env.ACR_LOGIN_SERVER }}" \
            --registry-identity "${IDENTITY_ID}" \
            --user-assigned "${IDENTITY_ID}" \
            --min-replicas 0 --max-replicas 10 \
            --cpu 1.0 --memory 2Gi \
            --secrets $SECRETS \
            --env-vars $ENV_VARS \
            --output none \
          2>/dev/null || \
          az containerapp update \
            --name prismrag-worker \
            --resource-group "${{ env.RESOURCE_GROUP }}" \
            --image "${{ env.ACR_LOGIN_SERVER }}/prismrag-worker:${TAG}" \
            --output none

      # ── Health check
      - name: Wait for API health
        run: |
          API_URL=$(az containerapp show \
            --name prismrag-api \
            --resource-group "${{ env.RESOURCE_GROUP }}" \
            --query properties.configuration.ingress.fqdn -o tsv)
          echo "API_URL=https://${API_URL}" >> $GITHUB_ENV
          echo "Polling https://${API_URL}/api/v1/prismrag/health ..."
          for i in $(seq 1 20); do
            STATUS=$(curl -sf "https://${API_URL}/api/v1/prismrag/health" \
                     -o /dev/null -w "%{http_code}" 2>/dev/null || echo "000")
            echo "  Attempt $i: HTTP $STATUS"
            [ "$STATUS" = "200" ] && { echo "Health check passed."; exit 0; }
            sleep 15
          done
          echo "Health check timed out" && exit 1

      - name: Deployment summary
        if: success()
        run: |
          echo "================================================="
          echo "  PrismRAG live: ${{ env.API_URL }}"
          echo "  Docs:          ${{ env.API_URL }}/docs"
          echo "  Image tag:     ${{ needs.build.outputs.image_tag }}"
          echo "================================================="

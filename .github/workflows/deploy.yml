name: Build & Deploy to Azure

# ── CI/CD behavior (read before pushing to main) ─────────────────────────────
# Every push to main ALWAYS runs:  Lint → Build & Push (Docker images to ACR)
#
# Azure deploy runs ONLY when:
#   1. Commit message contains the literal tag [publish], e.g.
#        git commit -m "fix(api): wire billing [publish]"
#   2. OR you manually run the workflow (Actions → Build & Deploy → Run workflow)
#
# Pushes without [publish] update ACR images but do NOT touch Container Apps.
# Use [publish] when infra/deploy-container-app.sh or secrets/env need to reach prod.

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      image_tag:
        description: 'Docker image tag (default: git SHA)'
        required: false
        default: ''

env:
  ACR_LOGIN_SERVER: prismragacr.azurecr.io
  RESOURCE_GROUP: prismrag-rg
  LOCATION: eastus2
  CONTAINER_ENV: prismrag-env
  PULL_IDENTITY_NAME: prismrag-pull-id

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip

      - name: Install deps
        run: pip install -r requirements.txt -r requirements-test.txt --quiet

      - name: Syntax check (no DB needed)
        run: python -c "import main; print('main.py OK')"
        env:
          PRISMRAG_DB_DSN: postgresql://skip:skip@localhost:5432/skip
          JWT_SECRET: ci-placeholder
          GEMINI_API_KEY: ci-placeholder

  build:
    name: Build & Push
    runs-on: ubuntu-latest
    needs: lint
    outputs:
      image_tag: ${{ steps.tag.outputs.tag }}

    steps:
      - uses: actions/checkout@v4

      - name: Resolve image tag
        id: tag
        run: |
          if [ -n "${{ github.event.inputs.image_tag }}" ]; then
            echo "tag=${{ github.event.inputs.image_tag }}" >> $GITHUB_OUTPUT
          else
            echo "tag=${{ github.sha }}" >> $GITHUB_OUTPUT
          fi

      - uses: docker/setup-buildx-action@v3

      - name: Log in to ACR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.ACR_LOGIN_SERVER }}
          username: ${{ secrets.ACR_USERNAME }}
          password: ${{ secrets.ACR_PASSWORD }}

      - name: Build & push API image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: Dockerfile
          platforms: linux/amd64
          push: true
          tags: |
            ${{ env.ACR_LOGIN_SERVER }}/prismrag-api:${{ steps.tag.outputs.tag }}
            ${{ env.ACR_LOGIN_SERVER }}/prismrag-api:latest
          cache-from: type=gha,scope=api
          cache-to: type=gha,mode=max,scope=api

      - name: Build & push Worker image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: Dockerfile.worker
          platforms: linux/amd64
          push: true
          tags: |
            ${{ env.ACR_LOGIN_SERVER }}/prismrag-worker:${{ steps.tag.outputs.tag }}
            ${{ env.ACR_LOGIN_SERVER }}/prismrag-worker:latest
          cache-from: type=gha,scope=worker
          cache-to: type=gha,mode=max,scope=worker

      - name: Deploy gate notice
        run: |
          MSG="${{ github.event.head_commit.message }}"
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            echo "::notice::Manual run — Deploy to Azure will run after this build."
          elif echo "$MSG" | grep -q '\[publish\]'; then
            echo "::notice::Commit contains [publish] — Deploy to Azure will run after this build."
          else
            echo "::notice::No [publish] in commit message — Lint + Build only. Images pushed to ACR; Container Apps unchanged."
            echo "         To deploy: git commit -m \"your message [publish]\" or use workflow_dispatch."
          fi

  # Skipped unless commit message contains [publish] or workflow_dispatch (see header).
  deploy:
    name: Deploy to Azure
    runs-on: ubuntu-latest
    needs: build
    environment: production
    # Gate: must include [publish] in commit message OR be a manual workflow_dispatch run.
    if: >
      github.event_name == 'workflow_dispatch' ||
      contains(github.event.head_commit.message, '[publish]')

    steps:
      - uses: actions/checkout@v4

      - name: Azure login
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Resolve pull identity
        id: identity
        run: |
          ID=$(az identity show \
            --name "${{ env.PULL_IDENTITY_NAME }}" \
            --resource-group "${{ env.RESOURCE_GROUP }}" \
            --query id -o tsv)
          echo "id=${ID}" >> $GITHUB_OUTPUT

      - name: Deploy infrastructure (Bicep)
        run: |
          az deployment group create \
            --resource-group "${{ env.RESOURCE_GROUP }}" \
            --template-file infra/container-env.bicep \
            --parameters location="${{ env.LOCATION }}" externalDb=true deployRedis=false \
            --mode Incremental \
            --output none

      - name: Deploy API container app
        env:
          APP_NAME: prismrag-api
          IMAGE: ${{ env.ACR_LOGIN_SERVER }}/prismrag-api:${{ needs.build.outputs.image_tag }}
          IDENTITY_ID: ${{ steps.identity.outputs.id }}
          DB_DSN: ${{ secrets.DB_CONNECTION_STRING }}
          JWT_SECRET: ${{ secrets.JWT_SECRET }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          STRIPE_SK: ${{ secrets.STRIPE_SECRET_KEY }}
          STRIPE_WH: ${{ secrets.STRIPE_WEBHOOK_SECRET }}
          SB_CONN: ${{ secrets.SERVICE_BUS_CONN_STR }}
          ACS_CONN: ${{ secrets.AZURE_COMMUNICATION_CONNECTION_STRING }}
          STRIPE_PRICE_STARTER: ${{ secrets.STRIPE_PRICE_STARTER }}
          STRIPE_PRICE_PROFESSIONAL: ${{ secrets.STRIPE_PRICE_PROF }}
          STRIPE_PRICE_ENTERPRISE: ${{ secrets.STRIPE_PRICE_ENTERPRISE }}
          PRISMRAG_EMAIL_FROM: ${{ secrets.PRISMRAG_EMAIL_FROM }}
          PRISMRAG_BASE_URL: ${{ secrets.PRISMRAG_BASE_URL }}
          INGRESS: external
          TARGET_PORT: "8001"
          MIN_REPLICAS: "1"
          MAX_REPLICAS: "20"
          CPU: "0.5"
          MEMORY: "1Gi"
        run: bash infra/deploy-container-app.sh

      - name: Deploy Worker container app
        env:
          APP_NAME: prismrag-worker
          IMAGE: ${{ env.ACR_LOGIN_SERVER }}/prismrag-worker:${{ needs.build.outputs.image_tag }}
          IDENTITY_ID: ${{ steps.identity.outputs.id }}
          DB_DSN: ${{ secrets.DB_CONNECTION_STRING }}
          JWT_SECRET: ${{ secrets.JWT_SECRET }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          STRIPE_SK: ${{ secrets.STRIPE_SECRET_KEY }}
          STRIPE_WH: ${{ secrets.STRIPE_WEBHOOK_SECRET }}
          SB_CONN: ${{ secrets.SERVICE_BUS_CONN_STR }}
          ACS_CONN: ${{ secrets.AZURE_COMMUNICATION_CONNECTION_STRING }}
          STRIPE_PRICE_STARTER: ${{ secrets.STRIPE_PRICE_STARTER }}
          STRIPE_PRICE_PROFESSIONAL: ${{ secrets.STRIPE_PRICE_PROF }}
          STRIPE_PRICE_ENTERPRISE: ${{ secrets.STRIPE_PRICE_ENTERPRISE }}
          PRISMRAG_EMAIL_FROM: ${{ secrets.PRISMRAG_EMAIL_FROM }}
          PRISMRAG_BASE_URL: ${{ secrets.PRISMRAG_BASE_URL }}
          MIN_REPLICAS: "0"
          MAX_REPLICAS: "10"
          CPU: "1.0"
          MEMORY: "2Gi"
        run: bash infra/deploy-container-app.sh

      - name: Wait for API health
        run: |
          API_URL=$(az containerapp show \
            --name prismrag-api \
            --resource-group "${{ env.RESOURCE_GROUP }}" \
            --query properties.configuration.ingress.fqdn -o tsv)
          echo "API_URL=https://${API_URL}" >> $GITHUB_ENV
          echo "Polling https://${API_URL}/api/v1/prismrag/health ..."
          for i in $(seq 1 20); do
            STATUS=$(curl -sf "https://${API_URL}/api/v1/prismrag/health" \
                     -o /dev/null -w "%{http_code}" 2>/dev/null || echo "000")
            echo "  Attempt $i: HTTP $STATUS"
            [ "$STATUS" = "200" ] && { echo "Health check passed."; exit 0; }
            sleep 15
          done
          echo "Health check timed out" && exit 1

      - name: Deployment summary
        if: success()
        run: |
          echo "================================================="
          echo "  PrismRAG live: ${{ env.API_URL }}"
          echo "  Docs:          ${{ env.API_URL }}/docs"
          echo "  Image tag:     ${{ needs.build.outputs.image_tag }}"
          echo "================================================="

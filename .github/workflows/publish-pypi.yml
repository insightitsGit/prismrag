name: Publish — PyPI (prismrag-patch)

# Trigger: push tag v* (e.g. v0.2.1) or manual run.
# Requires GitHub secret: PYPI_API_TOKEN (pypi.org → Account → API tokens)

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to publish (must match pyproject.toml)'
        required: true
        default: '0.2.1'

jobs:
  publish:
    name: Publish to PyPI
    runs-on: ubuntu-latest
    permissions:
      id-token: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Verify version matches tag
        if: startsWith(github.ref, 'refs/tags/v')
        run: |
          TAG="${GITHUB_REF#refs/tags/v}"
          PY=$(python -c "import tomllib; print(tomllib.load(open('prismrag_patch/pyproject.toml','rb'))['project']['version'])")
          echo "Tag version: $TAG"
          echo "pyproject version: $PY"
          test "$TAG" = "$PY"

      - name: Build
        run: |
          pip install build --quiet
          cd prismrag_patch && python -m build

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          password: ${{ secrets.PYPI_API_TOKEN }}
          packages-dir: prismrag_patch/dist/
